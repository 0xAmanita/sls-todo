name: Deploy Infrastructure and Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  AWS_REGION: ap-southeast-1
  TF_VERSION: 1.9.0
  NODE_VERSION: 20

jobs:
  build-lambda:
    name: Build Lambda Function
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: lambda/package-lock.json
      
      - name: Build Lambda
        run: ./scripts/build-lambda.sh
      
      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-build
          path: lambda/build/function.zip
          retention-days: 1

  terraform:
    name: Deploy Infrastructure with Terraform
    runs-on: ubuntu-latest
    needs: build-lambda
    if: github.event_name != 'pull_request'
    outputs:
      api_endpoint: ${{ steps.tf-output.outputs.api_endpoint }}
      cognito_user_pool_id: ${{ steps.tf-output.outputs.cognito_user_pool_id }}
      cognito_user_pool_client_id: ${{ steps.tf-output.outputs.cognito_user_pool_client_id }}
      amplify_app_url: ${{ steps.tf-output.outputs.amplify_app_url }}
      amplify_app_id: ${{ steps.tf-output.outputs.amplify_app_id }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-build
          path: lambda/build
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      
      - name: Run tfsec security scan
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: true
      
      - name: Deploy Infrastructure
        env:
          TF_VAR_github_repository: ${{ secrets.REPOSITORY_URL }}
          TF_VAR_github_token: ${{ secrets.AMPLIFY_GITHUB_TOKEN }}
          TF_VAR_github_branch: ${{ github.ref_name }}
        run: ./scripts/terraform-deploy.sh
      
      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan
          path: terraform/plan_output.txt
          retention-days: 7
      
      - name: Get Terraform Outputs
        id: tf-output
        working-directory: terraform
        run: |
          echo "api_endpoint=$(terraform output -raw api_endpoint)" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_id=$(terraform output -raw cognito_user_pool_id)" >> $GITHUB_OUTPUT
          echo "cognito_user_pool_client_id=$(terraform output -raw cognito_user_pool_client_id)" >> $GITHUB_OUTPUT
          echo "amplify_app_url=$(terraform output -raw amplify_app_url)" >> $GITHUB_OUTPUT
          echo "amplify_app_id=$(terraform output -raw amplify_app_id)" >> $GITHUB_OUTPUT

  notify:
    name: Send Deployment Notification
    runs-on: ubuntu-latest
    needs: [build-lambda, terraform]
    if: always()
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.terraform.result }}" = "success" ]; then
            echo "Full deployment pipeline succeeded"
            echo "Amplify will auto-deploy frontend from GitHub"
            echo "STATUS=success" >> $GITHUB_ENV
          else
            echo "Deployment pipeline failed"
            echo "STATUS=failure" >> $GITHUB_ENV
          fi
      
      - name: Deployment notification (placeholder)
        run: |
          echo "Deployment Notification"
          echo "======================="
          echo "Status: ${{ env.STATUS }}"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo "Workflow: ${{ github.workflow }}"
          echo ""
          echo "Frontend: Amplify will auto-deploy from this commit"
          echo "API Endpoint: ${{ needs.terraform.outputs.api_endpoint }}"
          echo "Amplify URL: ${{ needs.terraform.outputs.amplify_app_url }}"
          echo ""
          echo "In production, you would send this to Slack, Email, Teams, or PagerDuty"
